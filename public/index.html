<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Andinho Bet Analytics Pro</title>
<style>
* { box-sizing: border-box; }

body {
margin: 0;
background: linear-gradient(180deg, #08111f 0%, #0d1933 100%);
color: #fff;
font-family: Arial, sans-serif;
padding: 16px;
}

.container {
max-width: 1150px;
margin: 0 auto;
}

.titulo {
font-size: 34px;
font-weight: 800;
margin-bottom: 6px;
}

.subtitulo {
color: #b9c2d0;
margin-bottom: 18px;
font-size: 14px;
}

.painel {
display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 12px;
margin-bottom: 16px;
}

.box {
background: #101935;
border: 1px solid #24325f;
border-radius: 16px;
padding: 14px;
}

.box small {
display: block;
color: #b9c2d0;
margin-bottom: 8px;
font-size: 13px;
}

.box strong {
font-size: 28px;
}

.melhor-dia {
background: linear-gradient(90deg, #22c55e, #2dd4bf);
color: #07131f;
border-radius: 16px;
padding: 16px;
font-weight: 800;
margin-bottom: 18px;
min-height: 72px;
display: flex;
align-items: center;
}

.toolbar {
display: flex;
gap: 10px;
flex-wrap: wrap;
margin-bottom: 14px;
}

.toolbar input,
.toolbar button {
padding: 12px 14px;
border-radius: 12px;
border: none;
font-size: 16px;
}

.toolbar input {
min-width: 180px;
}

.toolbar button {
cursor: pointer;
font-weight: 800;
}

.btn-primary {
background: linear-gradient(90deg, #22c55e, #2dd4bf);
color: #04131b;
}

.btn-secondary {
background: #314d9f;
color: #fff;
}

.info {
color: #b9c2d0;
font-size: 14px;
margin-bottom: 12px;
}

.erro {
color: #ff9c9c;
margin-bottom: 12px;
}

.grid {
display: grid;
grid-template-columns: 1fr;
gap: 14px;
}

.card {
background: #101935;
border: 1px solid #24325f;
border-radius: 18px;
padding: 16px;
overflow: hidden;
}

.liga-topo {
color: #9ec3ff;
font-size: 14px;
font-weight: 700;
margin-bottom: 8px;
}

.linha1 {
display: flex;
justify-content: space-between;
gap: 14px;
align-items: flex-start;
flex-wrap: wrap;
}

.jogo {
font-size: 25px;
font-weight: 800;
line-height: 1.1;
margin-bottom: 10px;
}

.meta {
display: flex;
flex-wrap: wrap;
gap: 14px;
color: #d7dfef;
font-size: 14px;
margin-bottom: 12px;
}

.btn-analisar {
background: linear-gradient(90deg, #22c55e, #2dd4bf);
color: #04131b;
border: none;
border-radius: 14px;
padding: 14px 18px;
font-weight: 800;
cursor: pointer;
font-size: 17px;
min-width: 170px;
}

.pills {
margin-bottom: 10px;
}

.pill {
display: inline-block;
background: #18244b;
border: 1px solid #30457d;
border-radius: 999px;
padding: 10px 14px;
margin: 6px 8px 0 0;
font-size: 14px;
}

.analise {
margin-top: 14px;
padding-top: 14px;
border-top: 1px solid #26345f;
display: none;
}

.analise.show {
display: block;
}

.sec-title {
font-size: 19px;
font-weight: 800;
margin-bottom: 12px;
}

.analise-grid {
display: grid;
grid-template-columns: repeat(2, 1fr);
gap: 12px;
margin-bottom: 12px;
}

.analise-box {
background: #0b1430;
border: 1px solid #22345f;
border-radius: 14px;
padding: 12px;
}

.analise-box span {
display: block;
color: #aebbd6;
font-size: 12px;
margin-bottom: 6px;
}

.analise-box strong {
font-size: 17px;
line-height: 1.25;
display: block;
}

.entrada-lista {
display: grid;
grid-template-columns: 1fr;
gap: 10px;
margin-top: 10px;
}

.entrada-item {
background: #0c1532;
border: 1px solid #243963;
border-radius: 14px;
padding: 12px;
}

.entrada-top {
display: flex;
justify-content: space-between;
gap: 10px;
flex-wrap: wrap;
margin-bottom: 6px;
}

.entrada-tipo {
font-size: 15px;
font-weight: 800;
}

.entrada-confianca {
font-size: 14px;
font-weight: 800;
color: #ffd97a;
}

.entrada-desc {
color: #d7dfef;
font-size: 14px;
}

.badges {
margin-top: 12px;
}

.badge {
display: inline-block;
padding: 8px 12px;
border-radius: 999px;
font-size: 13px;
font-weight: 700;
margin: 6px 8px 0 0;
}

.cons {
background: #17391f;
color: #a9f7bb;
border: 1px solid #356b45;
}

.mod {
background: #47370d;
color: #ffe08a;
border: 1px solid #856521;
}

.ag {
background: #4c1621;
color: #ffafbd;
border: 1px solid #8c3047;
}

.vazio {
background: #101935;
border: 1px dashed #2b3b6f;
border-radius: 16px;
padding: 20px;
color: #b9c2d0;
}

@media (max-width: 920px) {
.painel {
grid-template-columns: repeat(2, 1fr);
}

.analise-grid {
grid-template-columns: 1fr;
}
}

@media (max-width: 600px) {
.titulo {
font-size: 28px;
}

.painel {
grid-template-columns: 1fr 1fr;
}

.jogo {
font-size: 22px;
}

.btn-analisar {
width: 100%;
}
}
</style>
</head>
<body>
<div class="container">
<div class="titulo">📊 Andinho Bet Analytics Pro</div>
<div class="subtitulo">Analisador profissional com jogos do dia, confiança por mercado e múltiplas entradas por jogo.</div>

<div class="painel">
<div class="box">
<small>Jogos do dia</small>
<strong id="totalJogos">0</strong>
</div>
<div class="box">
<small>Entradas fortes</small>
<strong id="entradasFortes">0</strong>
</div>
<div class="box">
<small>Melhor confiança</small>
<strong id="melhorConfianca">0%</strong>
</div>
<div class="box">
<small>Filtro Brasil</small>
<strong id="fusoAtual">-</strong>
</div>
</div>

<div class="melhor-dia" id="melhorEntradaDia">
🔥 Melhor entrada do dia: carregando...
</div>

<div class="toolbar">
<input type="date" id="data" />
<button class="btn-primary" id="btnBuscar">Buscar jogos</button>
<button class="btn-secondary" id="btnTop3">Mostrar Top 3</button>
</div>

<div class="info" id="info"></div>
<div class="erro" id="erro"></div>
<div class="grid" id="res"></div>
</div>

<script>
const hoje = new Date().toISOString().split('T')[0];
document.getElementById('data').value = hoje;
document.getElementById('btnBuscar').addEventListener('click', buscar);
document.getElementById('btnTop3').addEventListener('click', mostrarTop3);

let jogosCache = [];

function formatStatus(status) {
return status || 'N/A';
}

function formatHora(dataStr) {
if (!dataStr) return '';
return dataStr.replace('T', ' ').replace('.000000Z', '').replace('.000Z', '');
}

function hashSeed(texto) {
let h = 0;
for (let i = 0; i < texto.length; i++) {
h = (h * 31 + texto.charCodeAt(i)) % 100000;
}
return h;
}

function detectarCampeonato(jogo) {
if (jogo.league && jogo.league.name) return jogo.league.name;
if (jogo.league_name) return jogo.league_name;
const nome = (jogo.name || '').toLowerCase();

if (nome.includes('napoli') || nome.includes('cagliari')) return 'Itália';
if (nome.includes('corinthians') || nome.includes('chapecoense')) return 'Brasil';
if (nome.includes('hannover') || nome.includes('karlsruher')) return 'Alemanha';
if (nome.includes('odense') || nome.includes('vejle')) return 'Dinamarca';
if (nome.includes('heracles') || nome.includes('excelsior')) return 'Holanda';
return 'Campeonato';
}

function analisarJogo(jogo) {
const nome = jogo.name || '';
const status = (jogo.state?.name || '').toLowerCase();
const seed = hashSeed(nome + status + (jogo.starting_at || ''));

let base = 62 + (seed % 8);

if (status.includes('not started')) base = 66 + (seed % 8);
if (status.includes('1st half') || status.includes('first half')) base = 72 + (seed % 8);
if (status.includes('half time') || status.includes('halftime')) base = 79 + (seed % 8);
if (status.includes('2nd half') || status.includes('second half')) base = 82 + (seed % 10);
if (status.includes('finished') || status.includes('full time')) base = 0;

if (base > 92) base = 92;

const entradaSegura = status.includes('2nd half')
? 'Over 1.5 gols'
: status.includes('half time')
? 'Over 0.5 gol no 2º tempo'
: status.includes('1st half')
? 'Over 0.5 gol'
: 'Dupla chance casa';

const entradaModerada = status.includes('2nd half')
? 'Over 0.5 gol'
: status.includes('half time')
? 'Over 1.5 gols'
: status.includes('1st half')
? 'Over 1.5 gols'
: 'Casa ou empate';

const entradaAgressiva = status.includes('2nd half')
? 'Próximo gol no jogo'
: status.includes('half time')
? 'Ambas marcam'
: status.includes('1st half')
? 'Gol ainda no 1º tempo'
: 'Casa vence';

const entradaGols = status.includes('2nd half') ? 'Over 2.5 gols' : 'Over 1.5 gols';
const entradaEscanteios = status.includes('not started') ? 'Over 8.5 escanteios' : 'Over 9.5 escanteios';
const entradaCartoes = status.includes('not started') ? 'Over 3.5 cartões' : 'Over 4.5 cartões';

const confiancaSegura = base;
const confiancaModerada = Math.max(base - 6, 55);
const confiancaAgressiva = Math.max(base - 12, 50);
const confiancaGols = Math.max(base - 2, 58);
const confiancaEscanteios = Math.max(base - 5, 54);
const confiancaCartoes = Math.max(base - 7, 52);

const melhorEntrada = entradaSegura;
const melhorConfianca = confiancaSegura;
const oddIdeal = (1.28 + ((seed % 22) / 100)).toFixed(2);

const perfil = melhorConfianca >= 80 ? 'Conservadora' : (melhorConfianca >= 70 ? 'Moderada' : 'Agressiva');

return {
melhorEntrada,
melhorConfianca,
oddIdeal,
perfil,
resumo: status.includes('2nd half')
? '2º tempo costuma oferecer os melhores pontos para explorar gols e pressão final.'
: status.includes('half time')
? 'Intervalo é bom para buscar mercados de gol no 2º tempo.'
: status.includes('1st half')
? 'No 1º tempo, entradas leves em gols tendem a ser mais seguras.'
: 'No pré-jogo, mercados conservadores costumam proteger melhor a entrada.',
entradas: [
{
tipo: 'Entrada segura',
mercado: entradaSegura,
confianca: confiancaSegura,
desc: 'Opção mais protegida para trabalhar com menor risco.'
},
{
tipo: 'Entrada moderada',
mercado: entradaModerada,
confianca: confiancaModerada,
desc: 'Boa relação entre segurança e retorno.'
},
{
tipo: 'Entrada agressiva',
mercado: entradaAgressiva,
confianca: confiancaAgressiva,
desc: 'Mercado mais ousado para quem aceita maior risco.'
},
{
tipo: 'Mercado de gols',
mercado: entradaGols,
confianca: confiancaGols,
desc: 'Leitura focada em tendência de gols na partida.'
},
{
tipo: 'Mercado de escanteios',
mercado: entradaEscanteios,
confianca: confiancaEscanteios,
desc: 'Indicado para jogos com ritmo e pressão ofensiva.'
},
{
tipo: 'Mercado de cartões',
mercado: entradaCartoes,
confianca: confiancaCartoes,
desc: 'Boa opção para partidas de maior contato e disputa.'
}
]
};
}

function atualizarPainel(lista) {
const total = lista.length;
const fortes = lista.filter(j => j._analise.melhorConfianca >= 80).length;
const melhor = total ? Math.max(...lista.map(j => j._analise.melhorConfianca)) : 0;
const melhorJogo = total ? [...lista].sort((a, b) => b._analise.melhorConfianca - a._analise.melhorConfianca)[0] : null;

document.getElementById('totalJogos').textContent = total;
document.getElementById('entradasFortes').textContent = fortes;
document.getElementById('melhorConfianca').textContent = melhor + '%';
document.getElementById('fusoAtual').textContent = 'Brasil';

document.getElementById('melhorEntradaDia').textContent = melhorJogo
? `🔥 Melhor entrada do dia: ${melhorJogo.name} → ${melhorJogo._analise.melhorEntrada} (${melhorJogo._analise.melhorConfianca}%)`
: '🔥 Melhor entrada do dia: nenhum jogo encontrado';
}

function renderJogos(lista, apenasTop3 = false) {
const resDiv = document.getElementById('res');

if (!lista.length) {
resDiv.innerHTML = '<div class="vazio">Nenhum jogo encontrado.</div>';
return;
}

const jogosRender = apenasTop3
? [...lista].sort((a, b) => b._analise.melhorConfianca - a._analise.melhorConfianca).slice(0, 3)
: lista;

let html = '';

jogosRender.forEach((jogo, idx) => {
const a = jogo._analise;
const aid = `analise_${idx}_${Math.floor(Math.random() * 99999)}`;
const campeonato = detectarCampeonato(jogo);

html += `
<div class="card">
<div class="liga-topo">🏆 ${campeonato}</div>

<div class="linha1">
<div>
<div class="jogo">${jogo.name || 'Jogo sem nome'}</div>
<div class="meta">
<span>🕒 ${formatHora(jogo.starting_at)}</span>
<span>📊 Status: ${formatStatus(jogo.state?.name)}</span>
</div>
</div>
<div>
<button class="btn-analisar" onclick="toggleAnalise('${aid}')">Analisar jogo</button>
</div>
</div>

<div class="pills">
<div class="pill">🎯 Melhor entrada: <b>${a.melhorEntrada}</b></div>
<div class="pill">🔥 Confiança: <b>${a.melhorConfianca}%</b></div>
<div class="pill">💸 Odd ideal: <b>${a.oddIdeal}</b></div>
</div>

<div id="${aid}" class="analise">
<div class="sec-title">Resumo da análise</div>

<div class="analise-grid">
<div class="analise-box">
<span>Mercado principal</span>
<strong>${a.melhorEntrada}</strong>
</div>
<div class="analise-box">
<span>Perfil da entrada</span>
<strong>${a.perfil}</strong>
</div>
<div class="analise-box">
<span>Odd ideal</span>
<strong>${a.oddIdeal}</strong>
</div>
<div class="analise-box">
<span>Resumo</span>
<strong>${a.resumo}</strong>
</div>
</div>

<div class="sec-title">Entradas sugeridas</div>
<div class="entrada-lista">
${a.entradas.map(ent => `
<div class="entrada-item">
<div class="entrada-top">
<div class="entrada-tipo">${ent.tipo}</div>
<div class="entrada-confianca">Confiança: ${ent.confianca}%</div>
</div>
<div class="entrada-desc"><b>${ent.mercado}</b></div>
<div class="entrada-desc">${ent.desc}</div>
</div>
`).join('')}
</div>

<div class="badges">
<span class="badge cons">Segura: ${a.entradas[0].mercado} (${a.entradas[0].confianca}%)</span>
<span class="badge mod">Moderada: ${a.entradas[1].mercado} (${a.entradas[1].confianca}%)</span>
<span class="badge ag">Agressiva: ${a.entradas[2].mercado} (${a.entradas[2].confianca}%)</span>
</div>
</div>
</div>
`;
});

resDiv.innerHTML = html;
}

async function buscar() {
const d = document.getElementById('data').value;
const resDiv = document.getElementById('res');
const erroDiv = document.getElementById('erro');
const infoDiv = document.getElementById('info');

resDiv.innerHTML = '<div class="vazio">Carregando jogos...</div>';
erroDiv.innerHTML = '';
infoDiv.innerHTML = '';

try {
const response = await fetch('/api/fixtures?date=' + d);
const json = await response.json();

if (!json.ok) {
resDiv.innerHTML = '';
erroDiv.innerHTML = json.error || json.message || 'Erro ao buscar jogos.';
return;
}

const jogos = json.data || [];

infoDiv.innerHTML = `Data: ${json.date} • Fuso: ${json.timezone} • Jogos encontrados: ${json.count}`;

jogosCache = jogos.map(jogo => ({
...jogo,
_analise: analisarJogo(jogo)
}));

atualizarPainel(jogosCache);
renderJogos(jogosCache, false);
} catch (e) {
resDiv.innerHTML = '';
erroDiv.innerHTML = 'Erro ao carregar jogos.';
}
}

function mostrarTop3() {
renderJogos(jogosCache, true);
}

function toggleAnalise(id) {
const el = document.getElementById(id);
if (el) el.classList.toggle('show');
}

buscar();
</script>
</body>
</html>
