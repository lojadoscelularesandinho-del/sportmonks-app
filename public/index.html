<script>
const hoje = new Date().toISOString().split('T')[0];
document.getElementById('data').value = hoje;

async function buscar() {
const d = document.getElementById('data').value;
const resDiv = document.getElementById('res');

resDiv.innerHTML = 'Carregando...';

try {
const response = await fetch('/api/fixtures?date=' + d);
const data = await response.json();

const jogos = data.data || [];

if (!jogos.length) {
resDiv.innerHTML = 'Nenhum jogo encontrado.';
return;
}

resDiv.innerHTML = jogos.map(jogo => `
<div style="margin-bottom:15px;padding:12px;border:1px solid #333;border-radius:10px">
<b>${jogo.name || 'Jogo sem nome'}</b><br>
🕒 ${jogo.starting_at || ''}<br>
📊 Status: ${jogo.state?.name || 'N/A'}
</div>
`).join('');
} catch (e) {
resDiv.innerHTML = 'Erro ao carregar jogos.';
}
}
</script>
