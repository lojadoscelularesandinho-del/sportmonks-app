<script>
async function buscar() {
const dataInput = document.getElementById("data").value;
const resDiv = document.getElementById("res");

resDiv.innerHTML = "Carregando...";

try {
const response = await fetch(`/api/fixtures?date=${dataInput}`);
const data = await response.json();

const jogos = data.raw?.data || [];

if (!jogos.length) {
resDiv.innerHTML = "Nenhum jogo encontrado.";
return;
}

resDiv.innerHTML = jogos.map(jogo => `
<div style="margin-bottom:15px;padding:10px;border:1px solid #333;border-radius:8px">
<b>${jogo.name}</b><br>
🕒 ${jogo.starting_at}<br>
📊 Status: ${jogo.state?.name || 'N/A'}
</div>
`).join("");

} catch (e) {
resDiv.innerHTML = "Erro ao carregar jogos.";
}
}
</script>
