<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Jogos do Dia</title>
</head>

<body style="background:#0b1220;color:white;font-family:Arial;padding:20px">

<h2>📊 Jogos do Dia</h2>

<input type="date" id="data">
<button onclick="buscar()">Buscar</button>

<div id="res" style="margin-top:20px"></div>

<script>
const hoje = new Date().toISOString().split('T')[0];
document.getElementById('data').value = hoje;

async function buscar() {
const d = document.getElementById('data').value;

const r = await fetch('/api/fixtures?date=' + d);
const j = await r.json();

if (!j.data || j.data.length === 0) {
document.getElementById('res').innerHTML = 'Nenhum jogo encontrado.';
return;
}

let html = '';

j.data.forEach(x => {
html += `<p>${x.name}</p>`;
});

document.getElementById('res').innerHTML = html;
}
</script>

</body>
</html>
